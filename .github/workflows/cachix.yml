name: cachix

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Ref/branch to check'
        required: false
        type: string
    secrets:
      CACHIX_AUTH_TOKEN:
        description: 'auth token for writing to cachix (when called from CI)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest # x86_64-linux
          - macos-latest  # aarch64-darwin
        emacs:
          - emacs30
          - emacs30-nox
          - emacs30-gtk3
          - emacs30-pgtk
          - emacs31
          - emacs-without-nativecomp
        exclude:
          - os: macos-latest
            emacs: emacs30-gtk3
          - os: macos-latest
            emacs: emacs30-pgtk
        include:
          - os: macos-latest
            emacs: emacs30-macport
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          github_access_token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Enable Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: doom-emacs-unstraightened
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          cachixArgs: '-v'
      - name: Cache downloads
        uses: ./.github/actions/cache-downloads
      - name: Build packages for Cachix
        run: nix build ./cachix#cachix-${{ matrix.emacs }}
